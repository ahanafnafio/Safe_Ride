<!DOCTYPE html>
<html>
<head>
    <title>SafeRide Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="logo">Saferide</h1>
        <p class="subtitle">Create your account</p>

        <div class = "themeToggleRow">
            <button typ="button" id="themeToggle" class="themeToggleBtn">Dark Mode</button>
        </div>

        <form id="registerForm">

            <div class="input-group">
                <input type="text" id="firstName" placeholder="First Name" required>
            </div>

            <div class="input-group">
                <input type="text" id="lastName" placeholder="Last Name" required>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <p class="error-message" id="passwordError"></p>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <p class="error-message" id="confirmPasswordError"></p>

            <div class="role-section">
                <p class="role-label">Select Role</p>
            
                <div class="role-options">
                    <label for="roleRider">
                        <input type="radio" id="roleRider" name="userRole" value="Rider" checked>
                        <span>Rider</span>
                    </label>
            
                    <label for="roleDriver">
                        <input type="radio" id="roleDriver" name="userRole" value="Driver">
                        <span>Driver</span>
                    </label>
                </div>
            </div>

            <div id="driverFields" class="hidden">
                <div class="input-group">
                    <input type="text" id="licenseNumber" placeholder="Driver License Number">
                </div>
            
                <div class="input-group">
                    <input type="text" id="insuranceInfo" placeholder="Insurance Information">
                </div>
            </div>

            <button type="submit" class="login-btn">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>

    <script src="register.js"></script>
</body>
</html>
